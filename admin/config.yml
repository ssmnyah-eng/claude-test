backend:
  name: git-gateway
  branch: main

# Netlify Identity is required — enable it in your Netlify dashboard
# and configure Git Gateway under Settings > Identity > Services

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/posts/{{slug}}/"
    fields:
      - { label: "Title",         name: "title",       widget: "string" }
      - { label: "Publish Date",  name: "date",        widget: "datetime" }
      - { label: "Description",   name: "description", widget: "string",
          hint: "One-sentence summary for SEO meta description (150 chars max)" }
      - { label: "Featured Image", name: "image",      widget: "image", required: false }
      - { label: "Tags / Keywords", name: "tags",      widget: "list",
          hint: "e.g. movers in Fredericksburg VA, packing tips, organized moving company Virginia",
          required: false }
      - { label: "Body",           name: "body",        widget: "markdown" }
